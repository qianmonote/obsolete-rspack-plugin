<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= htmlRspackPlugin.options.title %></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
    #app { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 16px; color: #1a1a1a; }
    h2 { margin-top: 24px; margin-bottom: 8px; color: #444; }
    p { margin-bottom: 12px; }
    pre { background: #f5f5f5; padding: 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 16px; }
    code { font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 14px; }
    .nav { background: #f0f0f0; padding: 12px 20px; margin-bottom: 20px; }
    .nav a { margin-right: 16px; color: #0066cc; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="nav">
    <strong>Demos:</strong>
    <a href="http://localhost:3001">Basic</a>
    <a href="http://localhost:3002">Custom Template</a>
    <a href="http://localhost:3003">Custom Browsers</a>
    <a href="http://localhost:3004">Styled Container</a>
    <a href="http://localhost:3005">Auto Hide</a>
  </div>
  <div id="app"></div>
</body>
</html>
